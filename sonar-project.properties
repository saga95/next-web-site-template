# SonarQube / SonarCloud Configuration
# https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

sonar.projectKey=next-enterprise-template
sonar.projectName=Next.js Enterprise Template
sonar.projectVersion=1.0.0

# Source configuration
sonar.sources=src
sonar.tests=src,__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,__tests__/**/*

# TypeScript / JavaScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/public/**,\
  **/*.config.js,\
  **/*.config.mjs,\
  **/*.config.ts,\
  **/dist/**,\
  **/build/**

# Quality Gate thresholds (mirroring Jest 70% thresholds)
sonar.coverage.exclusions=\
  src/**/__tests__/**,\
  src/**/__mocks__/**,\
  src/**/*.d.ts,\
  src/pages/api/**

# Encoding
sonar.sourceEncoding=UTF-8
